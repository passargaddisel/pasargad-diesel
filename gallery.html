<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>گالری تصاویر تعمیر پمپ دیزل | پاسارگاد دیزل</title>
    <meta name="description" content="تصاویر واقعی از تعمیر پمپ دیزل، انژکتور، تست کامان‌ریل و تجهیزات پاسارگاد دیزل. کیفیت کار ما را ببینید.">
    <meta name="keywords" content="گالری تعمیر پمپ دیزل, تصاویر تعمیر انژکتور, پاسارگاد دیزل, تست کامان‌ریل">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- فایل CSS اصلی -->
    <link rel="stylesheet" href="styles.css">

    <!-- سبک مخصوص گالری -->
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .gallery-grid img {
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px #ccc;
        }

        .gallery-grid img:hover {
            transform: scale(1.05);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            padding-top: 60px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background: rgba(0,0,0,0.9);
        }

        .lightbox img {
            margin: auto;
            display: block;
            width: 80%;
            max-width: 700px;
            border-radius: 10px;
        }

        .lightbox:target {
            display: block;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 30px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<header>
    <h1>گالری پاسارگاد دیزل</h1>
    <nav>
        <a href="index.html">صفحه اصلی</a>
        <a href="services.html">خدمات</a>
        <a href="about.html">درباره ما</a>
        <a href="gallery.html">گالری</a>
        <a href="contact.html">تماس با ما</a>
    </nav>
</header>

<main>
    <section>
        <h2>تصاویر تعمیر پمپ و انژکتور دیزل</h2>
        <p>در این بخش می‌توانید تصاویر واقعی از تعمیر پمپ دیزل، انژکتور و تست کامان‌ریل را مشاهده کنید.</p>

        <div class="gallery-grid">

            <!-- عکس‌ها را بعداً با عکس‌های واقعی جایگزین کن -->
            <a href="#img1"><img src="https://images.unsplash.com/photo-1581091870622-1e7a8d2f6c3b" alt="تعمیر پمپ دیزل"></a>
            <a href="#img2"><img src="https://images.unsplash.com/photo-1581092795360-1f3f3f3f3f3f" alt="تست انژکتور"></a>
            <a href="#img3"><img src="https://images.unsplash.com/photo-1581091012184-5c1d1c1d1c1d" alt="کارگاه تعمیرات"></a>

        </div>

        <!-- Lightbox -->
        <div id="img1" class="lightbox">
            <a href="#" class="close-btn">&times;</a>
            <img src="https://images.unsplash.com/photo-1581091870622-1e7a8d2f6c3b">
        </div>

        <div id="img2" class="lightbox">
            <a href="#" class="close-btn">&times;</a>
            <img src="https://images.unsplash.com/photo-1581092795360-1f3f3f3f3f3f">
        </div>

        <div id="img3" class="lightbox">
            <a href="#" class="close-btn">&times;</a>
            <img src="https://images.unsplash.com/photo-1581091012184-5c1d1c1d1c1d">
        </div>

    </section>
</main>

<footer>
    <p>پاسارگاد دیزل - گالری تصاویر تعمیر پمپ و انژکتور دیزل</p>
</footer>

</body>
</html>
